service: serverless-service

plugins:
  - serverless-iam-roles-per-function

#frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs22.x

  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}

  environment:
    GROUPS_TABLE: GroupsF-${self:provider.stage}
    IMAGES_TABLE: Images-${self:provider.stage}
    IMAGE_ID_INDEX: ImageIdIndex
    IMAGES_S3_BUCKET: jng-unique-images-${self:provider.stage}
    SIGNED_URL_EXPIRATION: 300


